<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>交通 API</title>
    <link rel="stylesheet" href="/css/bootstrap.min.css">
    <link rel="stylesheet" href="/css/rwd.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg bg-body-tertiary">
        <div class="container-fluid">
            <a class="navbar-brand" href="#"><img class="brand-logo" src="/assets/TrafficLogo.png" alt="Traffic API Logo"></a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="#navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto nav-gap">
                    <li class="nav-item">
                        <a class="nav-link" onclick="showSearchForm('railwayInput')">鐵道查詢</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" onclick="showSearchForm('highSPDInput')">高鐵查詢</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" onclick="showSearchForm('AirInput')">航空查詢</a>
                    </li>
                </ul>
            </div>
            </div>
        </nav>

<main class="container app-shell mt-4 mt-lg-5 pt-4 pt-lg-5">
<section class="hero-section mb-5">
    <img class="hero-logo" src="/assets/TrafficLogo.png" alt="Traffic API Logo">
    <h4 class="text-center hero-copy">歡迎來到交通 API 查詢頁面，您可以在這邊查詢到您想要的運輸資料！</h4>
</section>
    <div id="railwayInput" class="input form-panel">
        <div class="input-group mb-3">
        <h4 class="section-title">台鐵查詢</h4>
        </div>
        <div class="input-group mb-3">
        <span class="input-group-text">出發站</span>
        <select id="startStation" class="form-select" aria-label="Default select example">
            <option selected disabled>請選擇出發站</option>
        </select>
        </div>

        <div class="input-group mb-3">
        <span class="input-group-text">抵達站</span>
        <select id="endStation" class="form-select" aria-label="Default select example">
            <option selected disabled>請選擇抵達站</option>
        </select>
        </div>
        <div class="input-group mb-3">
            <span class="input-group-text" id="basic-addon1">日期</span>
            <input id="railwayDate" type="date" class="form-control" name="selyourtakedate"/>

        </div>
        <div class="input-group mb-3 time-range-group">
            <span class="input-group-text" id="basic-addon1">時段起迄</span>
            <input id="railwayStartTime" type="time" class="form-control"/>
            <span class="time-separator">~</span>
            <input id="railwayEndTime" type="time" class="form-control"/>
        </div>
        <div class="input-group mb-3">
            <button id="railwaySubmit" type="submit" class="btn btn-primary">提交</button>
        </div>

        <div id="railwayMessage" class="mb-3"></div>

         <div class="results-table-wrap">
            <table id="railwayResultsTable" class="table" style="display: none;">
                <thead>
                    <tr>
                    <th scope="col">車次</th>
                    <th scope="col">車種</th>
                    <th scope="col">起站</th>
                    <th scope="col">迄站</th>
                    <th scope="col">出發日期</th>
                    <th scope="col">出發時間</th>
                    <th scope="col">抵達時間</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>
    </div>
    <div id="highSPDInput" class="input form-panel">
        <div class="input-group mb-3">
        <h4 class="section-title">高鐵查詢</h4>
        </div>
        <div class="input-group mb-3">
            <span class="input-group-text" id="basic-addon1">出發站</span>
            <select id="hsrStartStation" class="form-select" aria-label="高鐵出發站選單">
                <option selected disabled>請選擇出發站</option>
            </select>
        </div>
        <div class="input-group mb-3">
            <span class="input-group-text" id="basic-addon1">抵達站</span>
            <select id="hsrEndStation" class="form-select" aria-label="高鐵抵達站選單">
                <option selected disabled>請選擇抵達站</option>
            </select>
        </div>
        <div class="input-group mb-3">
            <span class="input-group-text" id="basic-addon1">出發日期</span>
            <input id="hsrDate" type="date" class="form-control" name="selyourtakedate"/>

        </div>
        <div class="input-group mb-3">
            <span class="input-group-text" id="basic-addon1">出發時間</span>
            <input id="hsrTime" type="time" class="form-control"/>
        </div>
        <div class="input-group dropdown mb-3">
            <button class="btn btn-secondary dropdown-toggle" type="button" id="dropdownMenuButton" data-toggle="dropdown" aria-haspopup="true" aria-expanded="false">
              適用優惠
            </button>
            <div class="dropdown-menu" aria-labelledby="dropdownMenuButton">
            </div>
          </div>
        <div class="input-group mb-3">
            <button id="hsrSubmit" type="submit" class="btn btn-primary">提交</button>
        </div>

        <div id="hsrMessage" class="mb-3"></div>

        <div class="results-table-wrap">
            <table id="hsrResultsTable" class="table" style="display: none;">
                <thead>
                    <tr>
                    <th scope="col">車次</th>
                    <th scope="col">車種</th>
                    <th scope="col">起站</th>
                    <th scope="col">迄站</th>
                    <th scope="col">出發日期</th>
                    <th scope="col">出發時間</th>
                    <th scope="col">抵達時間</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>
    </div>
    <div id="AirInput" class="input form-panel">
        <div class="input-group mb-3">
        <h4 class="section-title">航空查詢</h4>
        </div>
        <div class="input-group mb-3">
            <span class="input-group-text" id="basic-addon1">出發</span>
            <select id="airDepartureAirport" class="form-select" aria-label="航空出發機場選單">
                <option selected disabled>請選擇出發機場</option>
            </select>
        </div>
        <div class="input-group mb-3">
            <span class="input-group-text" id="basic-addon1">抵達</span>
            <select id="airArrivalAirport" class="form-select" aria-label="航空抵達機場選單">
                <option selected disabled>請選擇抵達機場</option>
            </select>
        </div>
        <div class="input-group mb-3">
            <span class="input-group-text" id="basic-addon1">日期</span>
            <input id="airFlightDate" type="date" class="form-control" aria-label="航空日期">
        </div>
        <div class="input-group mb-3">
            <span class="input-group-text" id="basic-addon1">關鍵字</span>
            <input id="airKeyword" type="text" class="form-control" placeholder="可輸入航班編號或航空公司代碼" aria-label="航空關鍵字" aria-describedby="basic-addon1">
        </div>
        <div class="input-group mb-3">
            <button type="submit" id="airSubmit" class="btn btn-primary">提交</button>
        </div>

        <div id="airMessage" class="mb-3"></div>

        <div class="results-table-wrap">
            <table id="airResultsTable" class="table" style="display: none;">
                <thead>
                    <tr>
                    <th scope="col">航班編號</th>
                    <th scope="col">航空公司</th>
                    <th scope="col">出發機場</th>
                    <th scope="col">抵達機場</th>
                    <th scope="col">航班日期</th>
                    <th scope="col">預定起飛</th>
                    <th scope="col">實際/預估起飛</th>
                    <th scope="col">航廈</th>
                    <th scope="col">登機門</th>
                    <th scope="col">狀態</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>
    </div>
</main>
    <script src="/js/popper.min.js"></script>
    <script src="/js/bootstrap.min.js"></script>
    <script src="/js/traffic.js"></script>
    <script src="/js/ullist.js"></script>
</body>
</html>
