<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>交通 API</title>
    <!-- Bootstrap.css -->
    <link href="https://www.itxst.com/package/bootstrap-4.5.0/css/bootstrap.css" rel="stylesheet">
    <link href="css/_root.scss" rel="stylesheet/scss" type="text/css">
    <link rel="stylesheet" href="css/bootstrap.min.css">
</head>
<!-- RWD清單 -->
    <nav class="navbar navbar-expand-lg bg-body-tertiary">
        <div class="container-fluid">
            <a class="navbar-brand" href="#"><img src="assets/TrafficLogo.png" style="width: 300px;"></a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav">
                    <li class="nav-item">
                        <a class="nav-link" onclick="showSearchForm('railwayInput')">鐵道查詢</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" onclick="showSearchForm('highSPDInput')">高鐵查詢</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" onclick="showSearchForm('AirInput')">航空查詢</a>
                    </li>
                </ul>
            </div>
            </div>  
        </nav>

<div class="container mt-5 pt-5">
<!-- 歡迎頁面 -->
<div class="row col mb-5">
    <img class="w-50 mx-auto" src="assets/TrafficLogo.png">
    <h4 class="text-center">歡迎來到交通 API 查詢頁面，您可以在這邊查詢到您想要的運輸資料！</h4>
</div>
<!-- 表單開始 -->
    <!-- 高鐵查詢 -->
    <div id="railwayInput" class="input">
        <div class="input-group mb-3">
        <h4>台鐵查詢</h4>
        </div>
        <div class="input-group mb-3">
            <span class="input-group-text" id="basic-addon1">出發站</span>
            <select class="form-select" aria-label="Default select example"><option selected>出發站</option><option value="1"></option>
            </select>
        </div>
        <div class="input-group mb-3">
            <span class="input-group-text" id="basic-addon1">抵達站</span>
            <select class="form-select" aria-label="Default select example">
                <option selected>抵達站</option>
                <option value="1"></option>
            </select>
        </div> 
        <div class="input-group mb-3">
            <span class="input-group-text" id="basic-addon1">日期</span>
            <input type="date" class="form-control" name="selyourtakedate"/>

        </div> 
        <div class="input-group mb-3">
            <span class="input-group-text" id="basic-addon1">時段起迄</span>
            <input type="time" class="form-control"/>
            &nbsp; ~ &nbsp;
            <input type="time" class="form-control"/>
        </div> 
        <div class="input-group mb-3">
            <button type="submit" class="btn btn-primary">提交</button>
        </div>
    </div>
    <!-- 高鐵查詢 -->
    <div id="highSPDInput" class="input">
        <div class="input-group mb-3">
        <h4>高鐵查詢</h4>
        </div>
        <div class="input-group mb-3">
            <span class="input-group-text" id="basic-addon1">出發站</span>
            <select class="form-select" aria-label="Default select example"><option selected>出發站</option><option value="1"></option>
            </select>
        </div>
        <div class="input-group mb-3">
            <span class="input-group-text" id="basic-addon1">抵達站</span>
            <select class="form-select" aria-label="Default select example">
                <option selected>抵達站</option>
                <option value="1"></option>
            </select>
        </div> 
        <div class="input-group mb-3">
            <span class="input-group-text" id="basic-addon1">出發日期</span>
            <input type="date" class="form-control" name="selyourtakedate"/>

        </div> 
        <div class="input-group mb-3">
            <span class="input-group-text" id="basic-addon1">出發時間</span>
            <input type="time" class="form-control"/>
        </div>
        <div class="input-group dropdown mb-3">
            <button class="btn btn-secondary dropdown-toggle" type="button" id="dropdownMenuButton" data-toggle="dropdown" aria-haspopup="true" aria-expanded="false">
              適用優惠
            </button>
            <div class="dropdown-menu" aria-labelledby="dropdownMenuButton">
            </div>
          </div> 
        <div class="input-group mb-3">
            <button type="submit" class="btn btn-primary">提交</button>
        </div>
    </div>
    <!-- 航空查詢 -->
    <div id="AirInput" class="input">
        <div class="input-group mb-3">
        <h4>航空查詢</h4>
        </div>
        <div class="input-group mb-3">
            <span class="input-group-text" id="basic-addon1">出發</span>
            <input type="text" class="form-control" placeholder="請輸入航班編號/航空公司/城市" aria-label="text" aria-describedby="basic-addon1">
        </div>
        <div class="input-group mb-3">
            <span class="input-group-text" id="basic-addon1">抵達</span>
            <input type="text" class="form-control" placeholder="請輸入航班編號/航空公司/城市" aria-label="text" aria-describedby="basic-addon1">
        </div> 
        <div class="input-group mb-3">
            <button type="submit" class="btn btn-primary">提交</button>
        </div>
    </div>
</div>
<body>
    <script src="js/popper.min.js"></script>
    <script src="js/bootstrap.min.js"></script>
    <script src="js/app.js"></script>
    <script src="js/ullist.js"></script>
</body>
</html>
